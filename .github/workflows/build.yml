name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: src/AutoLock.WinUI/AutoLock.WinUI.csproj
  RUNTIME_IDENTIFIER: win-x64

jobs:
  build:
    name: Build WinUI app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Debug
        run: dotnet restore $env:PROJECT_PATH --runtime $env:RUNTIME_IDENTIFIER --property:Configuration=Debug

      - name: Build Debug
        run: dotnet build $env:PROJECT_PATH --configuration Debug --runtime $env:RUNTIME_IDENTIFIER --no-restore

      - name: Restore Release
        run: dotnet restore $env:PROJECT_PATH --runtime $env:RUNTIME_IDENTIFIER --property:Configuration=Release --property:PublishReadyToRun=true

      - name: Build Release
        run: dotnet build $env:PROJECT_PATH --configuration Release --runtime $env:RUNTIME_IDENTIFIER --no-restore

  package:
    name: Publish release packages
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish x64 packages
        shell: pwsh
        run: >
          ./scripts/publish.ps1
          -Mode All
          -RuntimeIdentifier win-x64
          -Version "0.1.${{ github.run_number }}"
          -Clean
          -NoZip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AutoLock-win-x64
          path: artifacts/release/
          if-no-files-found: error
