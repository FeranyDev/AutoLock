name: Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        default: 1.0.0
      runtime:
        description: Windows runtime identifier
        required: true
        default: win-x64
        type: choice
        options:
          - win-x64
          - win-x86
          - win-arm64
      mode:
        description: Package mode
        required: true
        default: All
        type: choice
        options:
          - All
          - Folder
          - Msix

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  package:
    name: Package ${{ inputs.runtime }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish package
        shell: pwsh
        run: >
          ./scripts/publish.ps1
          -Mode "${{ inputs.mode }}"
          -RuntimeIdentifier "${{ inputs.runtime }}"
          -Version "${{ inputs.version }}"
          -Clean
          -NoZip
          -CreateTestCertificate

      - name: Upload portable artifact
        if: ${{ inputs.mode == 'Folder' || inputs.mode == 'All' }}
        uses: actions/upload-artifact@v7
        with:
          name: AutoLock-${{ inputs.version }}-${{ inputs.runtime }}-portable
          path: artifacts/release/AutoLock-${{ inputs.version }}-${{ inputs.runtime }}/folder/
          if-no-files-found: error

      - name: Upload MSIX artifact
        if: ${{ inputs.mode == 'Msix' || inputs.mode == 'All' }}
        uses: actions/upload-artifact@v7
        with:
          name: AutoLock-${{ inputs.version }}-${{ inputs.runtime }}-msix
          path: artifacts/release/AutoLock-${{ inputs.version }}-${{ inputs.runtime }}/msix/
          if-no-files-found: error
